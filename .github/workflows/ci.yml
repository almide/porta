name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-almide-${{ hashFiles('**/almide.toml') }}
          restore-keys: cargo-almide-

      - name: Install Almide
        run: cargo install --git https://github.com/almide/almide.git

      - name: Build
        run: almide build

      - name: Test
        run: almide test
